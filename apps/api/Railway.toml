[railway]
  builder = "nixpacks"
  language = "node"

[build]
  builder = "nixpacks"

[nixpacks]
  NODE_VERSION = "20"
  INSTALL_CMD = "npm install && npx prisma generate"
  BUILD_CMD = "npm run build"
  START_CMD = "npm run start:prod"

[deploy]
  healthcheckPath = "/health"
  healthcheckPort = 4000
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10
  numReplicas = 1
